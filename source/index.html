<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Đồ họa Fractal với WebGL</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<h1>Bài tập nhóm: Đồ họa Fractal (WebGL)</h1>
		<p><strong>Lớp:</strong> CS105.Q21 - Đồ họa Máy tính</p>
		<p><strong>Sinh viên thực hiện:</strong></p>

		<div class="member">
			<span class="stt">1.</span>
			<span class="name">Đặng Anh Khoa</span>
			<span class="mssv">- 23520732</span>
		</div>

		<div class="member">
			<span class="stt">2.</span>
			<span class="name">Phạm Minh Bảo Khang</span>
			<span class="mssv">- 23520705</span>
		</div>

		<div class="member">
			<span class="stt">3.</span>
			<span class="name">...</span>
			<span class="mssv">...</span>
		</div>

		<div class="controls">
			<label for="fractalType">Chọn Fractal:</label>
			<select id="fractalType">
				<option value="koch">Bông tuyết Koch (Snowflake)</option>
				<option value="minkowski">Đảo Minkowski</option>
				<option value="sierpinski_triangle">Tam giác Sierpinski</option>
				<option value="sierpinski_carpet">
					Hình vuông Sierpinski (Carpet)
				</option>
			</select>

			<label for="iterationN">Bước lặp (N):</label>
			<input
				type="range"
				id="iterationN"
				value="0"
				min="0"
				max="7"
				step="1"
				style="width: 180px"
			/>
			<span id="iterationNValue">0</span>
		</div>

		<br />
		<canvas id="glcanvas" width="600" height="600"></canvas>

		<script type="module" src="scripts.js"></script>
	</body>
</html>
